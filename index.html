<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan Idoso Metro</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f6f8;
        color: #333;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 {
        font-size: 1.4rem;
      }
      #cameraContainer {
        position: relative;
        display: block;
        margin-top: 12px;
        width: 100%;
        max-width: 640px;
      }
      video,
      #overlay {
        width: 100%;
        height: auto;
        max-width: 640px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
      }
      button {
        margin-top: 12px;
        padding: 12px 20px;
        font-size: 1rem;
        background: #2b7df4;
        color: #fff;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #1968d6;
      }
      #output {
        margin-top: 14px;
        font-size: 0.95rem;
        line-height: 1.4;
      }
      #output p {
        margin: 4px 0;
      }
      #output pre {
        background: #fff;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 0.85rem;
      }
      #output ul {
        margin: 8px 0;
        padding-left: 20px;
      }
      #output li {
        margin: 4px 0;
      }
      @media (max-width: 520px) {
        h1 {
          font-size: 1.2rem;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔍 Scan Idoso Metro</h1>
      <p>Câmera + OCR para validação de idade e cartão de idoso</p>
      
      <div id="cameraContainer" style="position: relative; display: block;">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay" style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none;"></canvas>
      </div>
      
      <button id="btnCapture">📸 Capturar e verificar</button>
      <div id="output"></div>
    </div>
    <script src="dist/web.js"></script>
  </body>
</html>
